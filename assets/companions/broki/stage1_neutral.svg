<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A5D6A7"/>
      <stop offset="100%" stop-color="#4CAF50"/>
    </radialGradient>
    <radialGradient id="cheek" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF8A65" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF8A65" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Subtle ground shadow -->
  <ellipse cx="32" cy="52" rx="14" ry="3" fill="#2E7D32" opacity="0.15"/>
  <!-- Body - small round green blob -->
  <circle cx="32" cy="36" r="16" fill="url(#glow)" stroke="#388E3C" stroke-width="1.5"/>
  <!-- Inner highlight -->
  <ellipse cx="28" cy="30" rx="8" ry="6" fill="#C8E6C9" opacity="0.5"/>
  <!-- Cute leaf on head -->
  <path d="M32 20 Q38 12 42 14 Q40 18 34 20Z" fill="#66BB6A" stroke="#388E3C" stroke-width="0.8"/>
  <line x1="32" y1="20" x2="38" y2="14" stroke="#388E3C" stroke-width="0.6"/>
  <!-- Stem -->
  <line x1="32" y1="20" x2="32" y2="23" stroke="#388E3C" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Eyes - big baby eyes -->
  <ellipse cx="26" cy="35" rx="3.5" ry="4" fill="#33691E"/>
  <ellipse cx="38" cy="35" rx="3.5" ry="4" fill="#33691E"/>
  <!-- Eye highlights -->
  <circle cx="27.5" cy="33.5" r="1.5" fill="white"/>
  <circle cx="39.5" cy="33.5" r="1.5" fill="white"/>
  <!-- Cheeks -->
  <circle cx="20" cy="39" r="4" fill="url(#cheek)"/>
  <circle cx="44" cy="39" r="4" fill="url(#cheek)"/>
  <!-- Small mouth -->
  <ellipse cx="32" cy="42" rx="2" ry="1" fill="#1B5E20" opacity="0.4"/>
</svg>
