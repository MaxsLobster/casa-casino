<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bodyGrad" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#A5D6A7"/>
      <stop offset="100%" stop-color="#43A047"/>
    </radialGradient>
    <radialGradient id="cheek" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF8A65" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF8A65" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Ground shadow -->
  <ellipse cx="32" cy="56" rx="16" ry="3" fill="#2E7D32" opacity="0.15"/>
  <!-- Body - sprout shape, wider at bottom -->
  <path d="M32 16 Q44 22 44 36 Q44 48 40 52 Q38 54 32 54 Q26 54 24 52 Q20 48 20 36 Q20 22 32 16Z" fill="url(#bodyGrad)" stroke="#388E3C" stroke-width="1.2"/>
  <!-- Inner highlight -->
  <ellipse cx="29" cy="30" rx="7" ry="8" fill="#C8E6C9" opacity="0.35"/>
  <!-- Two leaves on top -->
  <path d="M28 16 Q22 8 18 10 Q20 14 26 16Z" fill="#66BB6A" stroke="#388E3C" stroke-width="0.8"/>
  <path d="M36 16 Q42 8 46 10 Q44 14 38 16Z" fill="#66BB6A" stroke="#388E3C" stroke-width="0.8"/>
  <!-- Stem on top -->
  <line x1="32" y1="12" x2="32" y2="18" stroke="#388E3C" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Tiny bud -->
  <circle cx="32" cy="11" r="2" fill="#81C784" stroke="#388E3C" stroke-width="0.6"/>
  <!-- Eyes -->
  <ellipse cx="27" cy="34" rx="3" ry="3.5" fill="#1B5E20"/>
  <ellipse cx="37" cy="34" rx="3" ry="3.5" fill="#1B5E20"/>
  <!-- Eye highlights -->
  <circle cx="28" cy="33" r="1.2" fill="white"/>
  <circle cx="38" cy="33" r="1.2" fill="white"/>
  <!-- Cheeks -->
  <circle cx="21" cy="38" r="3.5" fill="url(#cheek)"/>
  <circle cx="43" cy="38" r="3.5" fill="url(#cheek)"/>
  <!-- Neutral mouth -->
  <line x1="29" y1="41" x2="35" y2="41" stroke="#1B5E20" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Small root feet -->
  <path d="M26 54 Q24 58 22 56" fill="none" stroke="#795548" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M38 54 Q40 58 42 56" fill="none" stroke="#795548" stroke-width="1.2" stroke-linecap="round"/>
</svg>
