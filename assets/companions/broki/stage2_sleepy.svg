  <!-- ZZZ -->
  <text x="44" y="22" font-family="sans-serif" font-size="7" font-weight="bold" fill="#66BB6A" opacity="0.8">z</text>
  <text x="48" y="16" font-family="sans-serif" font-size="9" font-weight="bold" fill="#66BB6A" opacity="0.6">z</text>
  <text x="53" y="10" font-family="sans-serif" font-size="11" font-weight="bold" fill="#66BB6A" opacity="0.4">z</text>
