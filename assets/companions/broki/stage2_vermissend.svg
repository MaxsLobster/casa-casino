<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bodyGrad" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#A5D6A7"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </radialGradient>
    <radialGradient id="cheek" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EF9A9A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#EF9A9A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Ground shadow -->
  <ellipse cx="32" cy="56" rx="14" ry="3" fill="#2E7D32" opacity="0.1"/>
  <!-- Body - slightly wilted -->
  <path d="M32 18 Q42 24 42 36 Q42 48 38 52 Q36 54 32 54 Q28 54 26 52 Q22 48 22 36 Q22 24 32 18Z" fill="url(#bodyGrad)" stroke="#2E7D32" stroke-width="1.2"/>
  <!-- Inner highlight - dim -->
  <ellipse cx="29" cy="32" rx="7" ry="8" fill="#C8E6C9" opacity="0.2"/>
  <!-- Wilted leaves -->
  <path d="M28 18 Q22 14 20 18 Q22 20 28 20Z" fill="#66BB6A" stroke="#388E3C" stroke-width="0.8" opacity="0.6"/>
  <path d="M36 18 Q42 14 44 18 Q42 20 36 20Z" fill="#66BB6A" stroke="#388E3C" stroke-width="0.8" opacity="0.6"/>
  <!-- Droopy stem -->
  <path d="M32 14 Q35 11 34 8" fill="none" stroke="#388E3C" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Big sad eyes -->
  <ellipse cx="27" cy="33" rx="3.5" ry="4.5" fill="#1B5E20"/>
  <ellipse cx="37" cy="33" rx="3.5" ry="4.5" fill="#1B5E20"/>
  <!-- Eye highlights - looking up sadly -->
  <circle cx="28.5" cy="31" r="1.8" fill="white"/>
  <circle cx="38.5" cy="31" r="1.8" fill="white"/>
  <!-- Sad eyebrows -->
  <line x1="22" y1="27" x2="28" y2="28" stroke="#1B5E20" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="42" y1="27" x2="36" y2="28" stroke="#1B5E20" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <!-- Cheeks -->
  <circle cx="21" cy="38" r="3" fill="url(#cheek)"/>
  <circle cx="43" cy="38" r="3" fill="url(#cheek)"/>
  <!-- Sad frown -->
  <path d="M28 42 Q32 39 36 42" fill="none" stroke="#1B5E20" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Tear drop -->
  <path d="M40 37 Q41 40 40 42 Q39 40 40 37Z" fill="#90CAF9" opacity="0.7"/>
  <!-- Root feet -->
  <path d="M26 54 Q24 58 22 56" fill="none" stroke="#795548" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M38 54 Q40 58 42 56" fill="none" stroke="#795548" stroke-width="1.2" stroke-linecap="round"/>
</svg>
