  <path d="M40 44 Q38 42 40 40" fill="none" stroke="#2E7D32" stroke-width="0.6" opacity="0.3"/>
  <!-- Crown of leaves -->
  <path d="M22 12 Q16 4 12 8 Q16 14 22 14Z" fill="#43A047" stroke="#2E7D32" stroke-width="0.8"/>
  <path d="M42 12 Q48 4 52 8 Q48 14 42 14Z" fill="#43A047" stroke="#2E7D32" stroke-width="0.8"/>
  <path d="M28 10 Q24 2 20 4 Q24 10 28 10Z" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.8"/>
  <path d="M36 10 Q40 2 44 4 Q40 10 36 10Z" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.8"/>
  <path d="M32 8 Q32 0 34 2 Q34 6 32 8Z" fill="#81C784" stroke="#2E7D32" stroke-width="0.6"/>
  <!-- Flower on top -->
  <circle cx="32" cy="5" r="3" fill="#FFF176" stroke="#F9A825" stroke-width="0.6"/>
  <circle cx="32" cy="5" r="1.2" fill="#FFB300"/>
  <!-- Branch arms -->
  <path d="M16 32 Q10 28 8 30" fill="none" stroke="#4E342E" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M48 32 Q54 28 56 30" fill="none" stroke="#4E342E" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Small leaves on branches -->
  <path d="M8 30 Q6 26 4 28 Q6 32 10 30Z" fill="#81C784" stroke="#388E3C" stroke-width="0.5"/>
  <path d="M56 30 Q58 26 60 28 Q58 32 54 30Z" fill="#81C784" stroke="#388E3C" stroke-width="0.5"/>
  <!-- Confident wise eyes -->
  <ellipse cx="27" cy="30" rx="3" ry="3.5" fill="#1B5E20"/>
  <ellipse cx="37" cy="30" rx="3" ry="3.5" fill="#1B5E20"/>
  <!-- Eye highlights -->
  <circle cx="28" cy="29" r="1.3" fill="white"/>
  <circle cx="38" cy="29" r="1.3" fill="white"/>
  <!-- Nature sparkle in eyes -->
  <circle cx="26" cy="31" r="0.5" fill="#A5D6A7"/>
  <circle cx="36" cy="31" r="0.5" fill="#A5D6A7"/>
  <!-- Cheeks -->
  <circle cx="20" cy="35" r="3.5" fill="url(#cheek)"/>
  <circle cx="44" cy="35" r="3.5" fill="url(#cheek)"/>
  <!-- Gentle wise smile -->
  <path d="M27 38 Q32 43 37 38" fill="none" stroke="#1B5E20" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Root feet - strong -->
  <path d="M24 58 Q20 62 18 60" fill="none" stroke="#5D4037" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M28 58 Q26 62 24 62" fill="none" stroke="#5D4037" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M40 58 Q44 62 46 60" fill="none" stroke="#5D4037" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M36 58 Q38 62 40 62" fill="none" stroke="#5D4037" stroke-width="1.2" stroke-linecap="round"/>
