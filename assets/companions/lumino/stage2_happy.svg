<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bodyGrad" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="100%" stop-color="#FFA000"/>
    </radialGradient>
    <radialGradient id="cheek" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF8A65" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FF8A65" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Outer glow - brighter when happy -->
  <ellipse cx="32" cy="38" rx="24" ry="22" fill="#FFE082" opacity="0.2"/>
  <!-- Flame body -->
  <path d="M32 8 Q42 18 42 30 Q42 42 38 48 Q36 52 32 52 Q28 52 26 48 Q22 42 22 30 Q22 18 32 8Z" fill="url(#bodyGrad)" stroke="#F9A825" stroke-width="1.2"/>
  <!-- Inner highlight -->
  <path d="M32 14 Q37 22 37 30 Q37 38 34 42 Q32 44 30 42 Q27 38 27 30 Q27 22 32 14Z" fill="#FFF8E1" opacity="0.4"/>
  <!-- Happy sparkle eyes - ^ ^ shape -->
  <path d="M24 31 L28 28 L32 31" fill="none" stroke="#4E342E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M32 31 L36 28 L40 31" fill="none" stroke="#4E342E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Cheeks - bigger when happy -->
  <circle cx="21" cy="35" r="4" fill="url(#cheek)"/>
  <circle cx="43" cy="35" r="4" fill="url(#cheek)"/>
  <!-- Big smile -->
  <path d="M26 37 Q32 44 38 37" fill="none" stroke="#BF360C" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Sparkles around -->
  <path d="M12 20 L14 18 L16 20 L14 22Z" fill="#FFD54F"/>
  <path d="M48 16 L50 14 L52 16 L50 18Z" fill="#FFD54F"/>
  <path d="M46 42 L48 40 L50 42 L48 44Z" fill="#FFD54F" opacity="0.7"/>
  <!-- Flame tips - more energetic -->
  <path d="M26 10 Q29 2 32 8" fill="none" stroke="#FFD54F" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M38 10 Q35 2 32 8" fill="none" stroke="#FFD54F" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M32 8 Q32 2 32 4" fill="none" stroke="#FFF176" stroke-width="1" stroke-linecap="round"/>
</svg>
