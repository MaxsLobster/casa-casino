<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bodyGrad" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#FFCC80"/>
      <stop offset="100%" stop-color="#E69100"/>
    </radialGradient>
    <radialGradient id="cheek" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EF9A9A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#EF9A9A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Dim outer glow -->
  <ellipse cx="32" cy="38" rx="18" ry="16" fill="#FFE082" opacity="0.1"/>
  <!-- Flame body - slightly smaller, sadder -->
  <path d="M32 12 Q40 20 40 31 Q40 42 37 48 Q35 52 32 52 Q29 52 27 48 Q24 42 24 31 Q24 20 32 12Z" fill="url(#bodyGrad)" stroke="#E69100" stroke-width="1.2"/>
  <!-- Inner highlight - dimmed -->
  <path d="M32 18 Q36 24 36 31 Q36 38 34 42 Q32 44 30 42 Q28 38 28 31 Q28 24 32 18Z" fill="#FFF8E1" opacity="0.2"/>
  <!-- Big sad eyes - looking up -->
  <ellipse cx="27" cy="31" rx="3.5" ry="4.5" fill="#4E342E"/>
  <ellipse cx="37" cy="31" rx="3.5" ry="4.5" fill="#4E342E"/>
  <!-- Eye highlights - bigger, looking upward -->
  <circle cx="28.5" cy="29" r="1.8" fill="white"/>
  <circle cx="38.5" cy="29" r="1.8" fill="white"/>
  <!-- Sad eyebrows -->
  <line x1="23" y1="25" x2="29" y2="26" stroke="#BF360C" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="41" y1="25" x2="35" y2="26" stroke="#BF360C" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <!-- Sad mouth - frown -->
  <path d="M28 40 Q32 37 36 40" fill="none" stroke="#BF360C" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Tear drop -->
  <path d="M40 35 Q41 38 40 40 Q39 38 40 35Z" fill="#90CAF9" opacity="0.7"/>
  <!-- Cheeks -->
  <circle cx="21" cy="36" r="3" fill="url(#cheek)"/>
  <circle cx="43" cy="36" r="3" fill="url(#cheek)"/>
  <!-- Flame barely flickering -->
  <path d="M31 13 Q32 9 33 13" fill="none" stroke="#FFD54F" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
</svg>
