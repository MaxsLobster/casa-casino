      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="40%" stop-color="#FFE082"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </radialGradient>
    <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cheek" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF8A65" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF8A65" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Radiant outer glow -->
  <ellipse cx="32" cy="34" rx="30" ry="28" fill="#FFE082" opacity="0.15"/>
  <ellipse cx="32" cy="34" rx="26" ry="24" fill="#FFE082" opacity="0.1"/>
  <!-- Majestic flame body -->
  <path d="M32 4 Q18 16 16 28 Q14 40 20 48 Q24 54 28 56 Q30 58 32 58 Q34 58 36 56 Q40 54 44 48 Q50 40 48 28 Q46 16 32 4Z" fill="url(#bodyGrad)" stroke="#F57F17" stroke-width="1"/>
