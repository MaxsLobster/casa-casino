<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#CE93D8"/>
      <stop offset="100%" stop-color="#7B1FA2"/>
    </radialGradient>
    <radialGradient id="cheek" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F48FB1" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#F48FB1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#FFF176" stop-opacity="0.4"/>
    </radialGradient>
  </defs>
  <!-- Mystical outer glow -->
  <circle cx="32" cy="36" r="22" fill="#CE93D8" opacity="0.15"/>
  <!-- Body - small round purple blob -->
  <circle cx="32" cy="36" r="16" fill="url(#glow)" stroke="#6A1B9A" stroke-width="1.5"/>
  <!-- Inner highlight -->
  <ellipse cx="28" cy="30" rx="8" ry="6" fill="#E1BEE7" opacity="0.4"/>
  <!-- Moon symbol on forehead -->
  <path d="M30 22 Q26 22 26 26 Q26 30 30 30 Q28 28 28 26 Q28 24 30 22Z" fill="url(#moonGlow)" stroke="#FFF176" stroke-width="0.5" opacity="0.9"/>
  <!-- Eyes - big mystical baby eyes -->
  <ellipse cx="26" cy="35" rx="3.5" ry="4" fill="#311B92"/>
  <ellipse cx="38" cy="35" rx="3.5" ry="4" fill="#311B92"/>
  <!-- Eye highlights - starry -->
  <circle cx="27.5" cy="33.5" r="1.5" fill="white"/>
  <circle cx="39.5" cy="33.5" r="1.5" fill="white"/>
  <circle cx="25" cy="36" r="0.6" fill="#E1BEE7"/>
  <circle cx="37" cy="36" r="0.6" fill="#E1BEE7"/>
  <!-- Cheeks -->
  <circle cx="20" cy="39" r="4" fill="url(#cheek)"/>
  <circle cx="44" cy="39" r="4" fill="url(#cheek)"/>
  <!-- Small mouth -->
  <ellipse cx="32" cy="42" rx="2" ry="1" fill="#4A148C" opacity="0.4"/>
  <!-- Tiny sparkle -->
  <circle cx="42" cy="24" r="1" fill="#FFF176" opacity="0.6"/>
  <circle cx="44" cy="22" r="0.5" fill="#FFF176" opacity="0.4"/>
</svg>
