<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bodyGrad" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#E1BEE7"/>
      <stop offset="100%" stop-color="#7B1FA2"/>
    </radialGradient>
    <radialGradient id="cheek" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F48FB1" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#F48FB1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E1BEE7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#E1BEE7" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Happy glowing aura -->
  <ellipse cx="32" cy="36" rx="28" ry="26" fill="url(#glowAura)"/>
  <!-- Crystal/moon body -->
  <path d="M32 10 Q44 16 46 32 Q46 46 40 52 Q36 56 32 56 Q28 56 24 52 Q18 46 18 32 Q20 16 32 10Z" fill="url(#bodyGrad)" stroke="#6A1B9A" stroke-width="1.2"/>
  <!-- Crystal facets - more visible when happy -->
  <path d="M32 10 L38 24 L32 20Z" fill="#E1BEE7" opacity="0.3"/>
  <path d="M32 10 L26 24 L32 20Z" fill="#E1BEE7" opacity="0.25"/>
