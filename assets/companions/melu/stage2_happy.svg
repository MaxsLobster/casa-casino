  <ellipse cx="29" cy="28" rx="8" ry="10" fill="#E1BEE7" opacity="0.3"/>
  <!-- Glowing moon crescent -->
  <path d="M28 14 Q24 14 24 18 Q24 22 28 22 Q26 20 26 18 Q26 16 28 14Z" fill="#FFF9C4" stroke="#FFF176" stroke-width="0.8"/>
  <!-- Crystal points glow -->
  <path d="M18 28 L12 25 L15 31Z" fill="#CE93D8" opacity="0.5"/>
  <path d="M46 28 L52 25 L49 31Z" fill="#CE93D8" opacity="0.5"/>
  <!-- Happy sparkle eyes -->
  <path d="M23 33 L27 30 L31 33" fill="none" stroke="#311B92" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M33 33 L37 30 L41 33" fill="none" stroke="#311B92" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Cheeks - glowing -->
  <circle cx="20" cy="37" r="4" fill="url(#cheek)"/>
  <circle cx="44" cy="37" r="4" fill="url(#cheek)"/>
  <!-- Big happy smile -->
  <path d="M26 39 Q32 46 38 39" fill="none" stroke="#4A148C" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Happy sparkles and stars -->
  <path d="M8 20 L10 18 L12 20 L10 22Z" fill="#FFF176"/>
  <path d="M52 16 L54 14 L56 16 L54 18Z" fill="#FFF176"/>
  <path d="M6 38 L8 36 L10 38 L8 40Z" fill="#CE93D8" opacity="0.6"/>
  <path d="M54 36 L56 34 L58 36 L56 38Z" fill="#CE93D8" opacity="0.6"/>
  <!-- Orbiting star particles -->
  <circle cx="14" cy="14" r="1.2" fill="#FFF176" opacity="0.7"/>
  <circle cx="50" cy="10" r="1" fill="#FFF176" opacity="0.5"/>
  <circle cx="56" cy="44" r="0.8" fill="#E1BEE7" opacity="0.5"/>
  <circle cx="8" cy="48" r="0.8" fill="#E1BEE7" opacity="0.4"/>
</svg>
