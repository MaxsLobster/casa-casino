<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bodyGrad" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#CE93D8"/>
      <stop offset="100%" stop-color="#7B1FA2"/>
    </radialGradient>
    <radialGradient id="cheek" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F48FB1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#F48FB1" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Mystical glow -->
  <ellipse cx="32" cy="36" rx="24" ry="22" fill="#CE93D8" opacity="0.1"/>
  <!-- Crystal/moon body shape -->
  <path d="M32 10 Q44 16 46 32 Q46 46 40 52 Q36 56 32 56 Q28 56 24 52 Q18 46 18 32 Q20 16 32 10Z" fill="url(#bodyGrad)" stroke="#6A1B9A" stroke-width="1.2"/>
  <!-- Crystal facets -->
  <path d="M32 10 L38 24 L32 20Z" fill="#E1BEE7" opacity="0.2"/>
  <path d="M32 10 L26 24 L32 20Z" fill="#E1BEE7" opacity="0.15"/>
  <!-- Inner highlight -->
  <ellipse cx="29" cy="28" rx="8" ry="10" fill="#E1BEE7" opacity="0.2"/>
  <!-- Moon crescent on top -->
  <path d="M28 14 Q24 14 24 18 Q24 22 28 22 Q26 20 26 18 Q26 16 28 14Z" fill="#FFF9C4" stroke="#FFF176" stroke-width="0.5"/>
  <!-- Small crystal points -->
  <path d="M18 28 L14 26 L16 30Z" fill="#CE93D8" opacity="0.4"/>
  <path d="M46 28 L50 26 L48 30Z" fill="#CE93D8" opacity="0.4"/>
  <!-- Eyes -->
  <ellipse cx="27" cy="34" rx="3" ry="3.5" fill="#311B92"/>
  <ellipse cx="37" cy="34" rx="3" ry="3.5" fill="#311B92"/>
  <!-- Eye highlights -->
  <circle cx="28" cy="33" r="1.2" fill="white"/>
  <circle cx="38" cy="33" r="1.2" fill="white"/>
  <!-- Cheeks -->
  <circle cx="21" cy="38" r="3.5" fill="url(#cheek)"/>
  <circle cx="43" cy="38" r="3.5" fill="url(#cheek)"/>
  <!-- Neutral mouth -->
  <line x1="29" y1="41" x2="35" y2="41" stroke="#4A148C" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Floating star particles -->
  <circle cx="12" cy="18" r="1" fill="#FFF176" opacity="0.5"/>
  <circle cx="52" cy="14" r="0.8" fill="#FFF176" opacity="0.4"/>
  <circle cx="10" cy="42" r="0.6" fill="#CE93D8" opacity="0.4"/>
</svg>
