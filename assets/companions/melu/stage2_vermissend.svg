      <stop offset="0%" stop-color="#CE93D8"/>
      <stop offset="100%" stop-color="#4A148C"/>
    </radialGradient>
    <radialGradient id="cheek" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EF9A9A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#EF9A9A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Dim sad glow -->
  <ellipse cx="32" cy="36" rx="20" ry="18" fill="#CE93D8" opacity="0.08"/>
