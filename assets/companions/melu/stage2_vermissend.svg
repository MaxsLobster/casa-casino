  <path d="M32 12 Q42 18 44 32 Q44 46 38 52 Q34 56 32 56 Q30 56 26 52 Q20 46 20 32 Q22 18 32 12Z" fill="url(#bodyGrad)" stroke="#4A148C" stroke-width="1.2"/>
