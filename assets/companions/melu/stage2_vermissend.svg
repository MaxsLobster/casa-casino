  <ellipse cx="27" cy="33" rx="3.5" ry="4.5" fill="#311B92"/>
  <ellipse cx="37" cy="33" rx="3.5" ry="4.5" fill="#311B92"/>
  <!-- Eye highlights - looking up sadly -->
  <circle cx="28.5" cy="31" r="1.8" fill="white"/>
  <circle cx="38.5" cy="31" r="1.8" fill="white"/>
  <!-- Sad eyebrows -->
  <line x1="22" y1="27" x2="28" y2="28" stroke="#4A148C" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="42" y1="27" x2="36" y2="28" stroke="#4A148C" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <!-- Cheeks -->
  <circle cx="21" cy="38" r="3" fill="url(#cheek)"/>
  <circle cx="43" cy="38" r="3" fill="url(#cheek)"/>
  <!-- Sad frown -->
  <path d="M28 42 Q32 39 36 42" fill="none" stroke="#4A148C" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Mystical tear -->
  <path d="M40 37 Q41 40 40 42 Q39 40 40 37Z" fill="#90CAF9" opacity="0.7"/>
  <!-- Scattered dim star particles - lonely -->
